services:
  postgres:
    image: postgres:17
    container_name: materimperium-postgres-prod
    environment:
      POSTGRES_DB: materimperium
      POSTGRES_USER: materimperium
      POSTGRES_PASSWORD: materimperium
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: materimperium-api
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/materimperium
      DB_USERNAME: materimperium
      DB_PASSWORD: materimperium
      SERVER_PORT: 8082
      APP_TEMP_DIR: /tmp/materimperium
    ports:
      - "${APP_PORT:-8082}:8082"

volumes:
  postgres-prod-data:
